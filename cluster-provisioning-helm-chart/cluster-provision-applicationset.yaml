apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-provisioning-factory
  namespace: openshift-gitops
spec:
  generators:
    - git:
        repoURL: 'https://github.com/your-org/gitops-catalog-repo.git'
        targetRevision: HEAD
        files:
          - path: "provisions/*.yaml"
  template:
    metadata:
      name: 'deploy-{{clusterName}}'
      namespace: openshift-gitops
    spec:
      project: default
      sources:
        - repoURL: 'https://github.com/your-org/gitops-catalog-repo.git'
          targetRevision: HEAD
          path: components/cluster-provision
          helm:
            valueFiles:
              - $values/{{path}}
        - repoURL: 'https://github.com/your-org/gitops-catalog-repo.git'
          targetRevision: HEAD
          ref: values
      destination:
        server: 'https://kubernetes.default.svc'
        namespace: openshift-gitops
      syncPolicy:
        automated:
          prune: true
          selfHeal: true