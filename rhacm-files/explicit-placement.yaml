apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: policy-argo-bootstrap-dev
  namespace: open-cluster-management-global-set
spec:
  remediationAction: enforce
  disabled: false
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: config-policy-argo-bootstrap-dev
        spec:
          remediationAction: enforce
          severity: high
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: argoproj.io/v1alpha1
                kind: Application
                metadata:
                  name: root-bootstrap
                  namespace: openshift-gitops
                spec:
                  project: default
                  source:
                    repoURL: 'https://github.com/your-org/your-cluster-gitops-repo.git'
                    targetRevision: HEAD
                    path: bootstrap/overlays/dev # Hardcoded to dev
                  destination:
                    server: 'https://kubernetes.default.svc'
                  syncPolicy:
                    automated:
                      prune: true
                      selfHeal: true
---
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: placement-argo-bootstrap-dev
  namespace: open-cluster-management-global-set
spec:
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchLabels:
            environment: dev # Only targets clusters explicitly labeled 'dev'
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: binding-argo-bootstrap-dev
  namespace: open-cluster-management-global-set
placementRef:
  apiGroup: cluster.open-cluster-management.io
  kind: Placement
  name: placement-argo-bootstrap-dev
subjects:
  - apiGroup: policy.open-cluster-management.io
    kind: Policy
    name: policy-argo-bootstrap-dev